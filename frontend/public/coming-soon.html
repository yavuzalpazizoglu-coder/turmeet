<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TURMEET | Yakında</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #e20074;
      --pink-glow: rgba(226, 0, 116, 0.35);
      --pink-dim: rgba(226, 0, 116, 0.12);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080808;
      color: #fff;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse at center, var(--pink-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 680px;
      width: 100%;
    }
    .logo-wrap { margin-bottom: 2.5rem; }
    .logo-img {
      width: min(360px, 82vw);
      height: auto;
      filter: drop-shadow(0 0 32px var(--pink-glow));
      display: block;
      margin: 0 auto;
    }
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      margin: 0 auto 2rem;
    }
    .tagline {
      font-size: clamp(0.72rem, 2.2vw, 0.88rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 2.5rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(226, 0, 116, 0.28);
      background: var(--pink-dim);
      border-radius: 100px;
      padding: 12px 28px;
      font-size: 0.875rem;
      color: #ccc;
      backdrop-filter: blur(8px);
      letter-spacing: 0.04em;
    }
    .dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      position: relative;
    }
    .dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--pink-glow);
      animation: ping 1.8s ease-in-out infinite;
    }
    @keyframes ping {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(2.2); opacity: 0; }
    }
    .footer {
      margin-top: 3.5rem;
      font-size: 0.7rem;
      color: #2a2a2a;
      letter-spacing: 0.06em;
    }
  </style>
</head>
