<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turmeet — Coming Soon</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #2D2D2D;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 760px;
      padding: 3.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Logo ─────────────────────────────── */
    .logo-img {
      width: min(400px, 85vw);
      height: auto;
      display: block;
      margin-bottom: 3rem;
    }

    /* ── Accent line ──────────────────────── */
    .line {
      width: 48px;
      height: 3px;
      background: #C2185B;
      margin-bottom: 2rem;
    }

    /* ── Headline ─────────────────────────── */
    .headline {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 400;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    .sub {
      font-size: clamp(0.72rem, 2vw, 0.8rem);
      color: #C2185B;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    /* ── Stats ────────────────────────────── */
    .stats {
      display: flex;
      width: 100%;
      max-width: 540px;
      margin-bottom: 2.5rem;
      border-top: 1px solid #444;
      border-bottom: 1px solid #444;
    }
    .stat {
      flex: 1;
      padding: 1.4rem 0.5rem;
      text-align: center;
      border-right: 1px solid #444;
    }
    .stat:last-child { border-right: none; }
    .stat-number {
      display: block;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 700;
      color: #C2185B;
      letter-spacing: -0.03em;
      margin-bottom: 0.3rem;
    }
    .stat-label {
      font-size: 0.62rem;
      color: #C2185B;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* ── Badge ────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #C2185B;
      padding: 10px 24px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Power statement ─────────────────── */
    .power {
      font-size: 0.8rem;
      color: #C2185B;
      font-style: italic;
      text-align: center;
      margin-bottom: 3rem;
    }

    /* ── Footer ───────────────────────────── */
    .footer {
      font-size: 0.65rem;
      color: #C2185B;
      letter-spacing: 0.08em;
      text-align: center;
    }

    @media (max-width: 480px) {
      .stats { flex-direction: column; }
      .stat { border-right: none; border-bottom: 1px solid #444; }
      .stat:last-child { border-bottom: none; }
    }
  </style>
</head>
